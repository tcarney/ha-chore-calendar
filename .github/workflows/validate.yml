name: validate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  hassfest: # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@f6f29a7ee3fa0eccadf3620a7b9ee00ab54ec03b # master @ 2026-05-01

  hacs: # https://github.com/hacs/action
    runs-on: "ubuntu-latest"
    steps:
      - name: Run HACS validation
        uses: hacs/action@dcb30e72781db3f207d5236b861172774ab0b485 # main @ 2026-05-01
        with:
          category: integration
          # Remove this 'ignore' key when you have added brand images for your custom integration to https://github.com/home-assistant/brands
          ignore: brands
