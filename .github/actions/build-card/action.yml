name: Build card
description: >-
  Build the Lovelace card bundle, then either commit the result (if it drifted
  from the committed bundle) or verify the committed bundle is already current.

inputs:
  commit:
    description: >-
      "true" commits the rebuilt bundle back to the current branch if it
      changed; "false" fails the job when the committed bundle is stale
      (verify-only). The caller must have checked out a writable branch when
      committing.
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "20"
        cache: "npm"
        cache-dependency-path: "card/package-lock.json"

    - name: Build card
      shell: bash
      run: script/card/build

    # Author the rebuild as whoever last changed the bundle's inputs (manifest
    # version or card source) rather than the workflow actor: the release-please
    # bot on a release PR, the contributor on a normal PR. Scoping to those
    # paths credits the commit that actually drove the rebuild even when a PR
    # mixes in unrelated commits.
    - name: Capture bundle-input commit author
      id: trigger-author
      if: ${{ inputs.commit == 'true' }}
      shell: bash
      run: |
        author="$(git log -1 --pretty='%an <%ae>' -- custom_components/chore_calendar/manifest.json card/src)"
        echo "author=$author" >> "$GITHUB_OUTPUT"

    - name: Commit refreshed bundle
      if: ${{ inputs.commit == 'true' }}
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      with:
        commit_message: "build: rebuild card bundle"
        file_pattern: "custom_components/chore_calendar/www/*"
        commit_author: ${{ steps.trigger-author.outputs.author }}

    - name: Verify committed bundle matches build
      if: ${{ inputs.commit != 'true' }}
      shell: bash
      run: git diff --exit-code -- custom_components/chore_calendar/www/
